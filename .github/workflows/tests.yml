name: Tests

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run fork-specific tests (survives upstream sync)
  fork-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.11

      - name: Install deps
        run: |
          uv venv .venv --python 3.11
          uv pip install -e ".[all,dev]" --python .venv/bin/python

      - name: Run fork tests
        run: .venv/bin/python -m pytest tests/fork/ -v --tb=short
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

  # Run e2e tests (full integration)
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.11

      - name: Install deps
        run: |
          uv venv .venv --python 3.11
          uv pip install -e ".[all,dev]" --python .venv/bin/python

      - name: Run e2e tests
        run: .venv/bin/python -m pytest tests/e2e/ -v --tb=short
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""


