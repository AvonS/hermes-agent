name: Tests

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.11

      - name: Install tools
        run: |
          uv venv .venv --python 3.11
          uv pip install pre-commit bandit ruff --python .venv/bin/python

      - name: Lint & format
        run: |
          .venv/bin/ruff check .
          .venv/bin/ruff format --check .

      - name: Security scan
        run: |
          .venv/bin/python -m bandit -r . -x ./tests,./environments -f json --output bandit-report.json || true
        continue-on-error: true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: bandit-report.json

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.11

      - name: Install deps
        run: |
          uv venv .venv --python 3.11
          uv pip install -e ".[all,dev]" --python .venv/bin/python

      - name: Run tests
        run: .venv/bin/python -m pytest tests/ -q --ignore=tests/integration --ignore=tests/e2e --ignore=tests/tools/test_rl_training_tool.py --ignore=tests/agent/test_subagent_progress.py --ignore=tests/cli/test_reasoning_command.py --ignore=tests/tools/test_delegate.py --ignore=tests/hermes_cli/test_cmd_update.py --ignore=tests/hermes_cli/test_model_validation.py --ignore=tests/hermes_cli/test_update_check.py --ignore=tests/tools/test_registry.py --tb=short -n auto
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.11

      - name: Install deps
        run: |
          uv venv .venv --python 3.11
          uv pip install -e ".[all,dev]" --python .venv/bin/python

      - name: Run e2e tests
        run: .venv/bin/python -m pytest tests/e2e/ -v --tb=short
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

  promote-release:
    needs: [test, e2e]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if PR exists
        id: check-pr
        run: |
          PR=$(gh pr list --base release --head dev --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          echo "pr_exists=$( [ -n "$PR" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.check-pr.outputs.pr_exists == 'false'
        run: gh pr create --title "Release $(date +%Y%m%dT%H%M%SZ)" --body "Auto-created after tests passed on dev." --base release --head dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
