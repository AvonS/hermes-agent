# CodeQL configuration - exclude false positive paths
name: hermes-agent-security
description: Exclude paths with known false positives

# Exclude test files (no need to scan for security)
paths-ignore:
  - '**/test_*.py'
  - '**/tests/**'
  - '**/*_test.py'

# Exclude noisy rules that generate 100+ alerts
queries:
  - uses: security-extended
    filters:
      - exclude:
          id: py/clear-text-logging-sensitive-data
      - exclude:
          id: py/clear-text-logging-password
      - exclude:
          id: py/log-injection