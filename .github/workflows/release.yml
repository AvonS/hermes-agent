name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
        default: patch
      notes:
        description: 'Release notes (optional)'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    # Set Node.js 24 for runner
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config --global user.email "avonslabs@github.com"
          git config --global user.name "AvonS"

      - name: Get upstream version
        id: version
        run: |
          # Read upstream version from pyproject.toml
          UPSTREAM=$(grep '^version = "' pyproject.toml | sed 's/version = "\(.*\)"/\1/' | tr -d ' ')
          echo "upstream_version=$UPSTREAM" >> $GITHUB_OUTPUT
          echo "Upstream version: $UPSTREAM"

      - name: Calculate fork version
        id: fork-version
        run: |
          UPSTREAM=${{ steps.version.outputs.upstream_version }}
          
          # Determine bump type: default to patch for auto-push, use input for manual
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version_type }}" ]; then
            BUMP_TYPE="${{ github.event.inputs.version_type }}"
          else
            BUMP_TYPE="patch"  # Auto-bump on push
          fi
          
          # Check if there are local commits on dev not in upstream
          # If dev is just fast-forward from upstream, no fork version bump needed
          LOCAL_COMMITS=$(git log origin/main..origin/dev --oneline 2>/dev/null | wc -l || echo "0")
          echo "Local commits on dev not in upstream: $LOCAL_COMMITS"
          echo "local_commits=$LOCAL_COMMITS" >> $GITHUB_OUTPUT
          
          # Get last fork tag
          LAST_TAG=$(git tag --list '*-avons.*' | sort -V | tail -1 || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            # First release
            FORK_MINOR=1
            FORK_PATCH=0
          else
            # Parse last tag: e.g., 0.10.0-avons.1.0
            LAST_MINOR=$(echo $LAST_TAG | sed 's/.*-avons.\([0-9]*\).*/\1/')
            LAST_PATCH=$(echo $LAST_TAG | sed 's/.*-avons.[0-9]*.\([0-9]*\)/\1/')
            
            # Only bump if there are local commits or manual trigger
            if [ "$BUMP_TYPE" = "patch" ] && [ "$LOCAL_COMMITS" = "0" ]; then
              # No local changes, just upstream sync - keep same fork version
              FORK_MINOR=$LAST_MINOR
              FORK_PATCH=$LAST_PATCH
              echo "No local changes, skipping fork version bump"
            elif [ "$BUMP_TYPE" == "minor" ]; then
              FORK_MINOR=$((LAST_MINOR + 1))
              FORK_PATCH=0
            else
              # patch (with local changes)
              FORK_MINOR=$LAST_MINOR
              FORK_PATCH=$((LAST_PATCH + 1))
            fi
          fi
          
          FORK_VERSION="${UPSTREAM}-avons.${FORK_MINOR}.${FORK_PATCH}"
          echo "fork_version=$FORK_VERSION" >> $GITHUB_OUTPUT
          echo "Fork version: $FORK_VERSION"

      - name: Create release tag
        id: tag
        run: |
          VERSION=${{ steps.fork-version.outputs.fork_version }}
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.fork-version.outputs.fork_version }}
          NOTES="${{ github.event.inputs.notes }}"
          
          # Default release notes if not provided
          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION"
          fi
          
          gh release "$VERSION" --title "Release $VERSION" --notes "$NOTES" --generate-notes
          
          echo "Created release: $VERSION"

      - name: Write .fork-version file
        run: |
          VERSION=${{ steps.fork-version.outputs.fork_version }}
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Write fork version metadata file
          # This is separate from .update_check and survives upstream sync
          cat > $HOME/.fork-version << EOF
          {
            "installed_version": "$VERSION",
            "installed_at": "$TIMESTAMP",
            "source": "release"
          }
          EOF
          
          echo "Wrote ~/.fork-version:"
          cat $HOME/.fork-version

      - name: Summary
        run: |
          TRIGGER_TYPE="Auto (push to release)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRIGGER_TYPE="Manual"
          fi
          
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.fork-version.outputs.fork_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** $TRIGGER_TYPE" >> $GITHUB_STEP_SUMMARY
          echo "**Local Commits:** ${{ steps.fork-version.outputs.local_commits }}" >> $GITHUB_STEP_SUMMARY